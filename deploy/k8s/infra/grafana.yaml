apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: freeexchanged
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: freeexchanged
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
