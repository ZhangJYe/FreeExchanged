apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hive-warehouse-pvc
  namespace: freeexchanged
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hive-metastore-pvc
  namespace: freeexchanged
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-config
  namespace: freeexchanged
data:
  hive-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:derby:;databaseName=/opt/hive/metastore/metastore_db;create=true</value>
      </property>
      <property>
        <name>hive.metastore.warehouse.dir</name>
        <value>/opt/hive/warehouse</value>
      </property>
      <property>
        <name>hive.server2.enable.doAs</name>
        <value>false</value>
      </property>
    </configuration>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-schema-sql
  namespace: freeexchanged
data:
  events.hql: |
    CREATE DATABASE IF NOT EXISTS freeexchanged;

    CREATE EXTERNAL TABLE IF NOT EXISTS freeexchanged.article_events_raw (
      json STRING
    )
    STORED AS TEXTFILE
    LOCATION '/opt/hive/warehouse/freeexchanged/article_events_raw';

    CREATE EXTERNAL TABLE IF NOT EXISTS freeexchanged.interaction_events_raw (
      json STRING
    )
    STORED AS TEXTFILE
    LOCATION '/opt/hive/warehouse/freeexchanged/interaction_events_raw';

    CREATE VIEW IF NOT EXISTS freeexchanged.article_events AS
    SELECT
      get_json_object(json, '$.event_id') AS event_id,
      get_json_object(json, '$.event_type') AS event_type,
      CAST(get_json_object(json, '$.version') AS INT) AS version,
      CAST(get_json_object(json, '$.article_id') AS BIGINT) AS article_id,
      get_json_object(json, '$.title') AS title,
      CAST(get_json_object(json, '$.author_id') AS BIGINT) AS author_id,
      CAST(get_json_object(json, '$.occurred_at') AS BIGINT) AS occurred_at
    FROM freeexchanged.article_events_raw;

    CREATE VIEW IF NOT EXISTS freeexchanged.interaction_events AS
    SELECT
      get_json_object(json, '$.event_id') AS event_id,
      get_json_object(json, '$.event_type') AS event_type,
      CAST(get_json_object(json, '$.version') AS INT) AS version,
      CAST(get_json_object(json, '$.user_id') AS BIGINT) AS user_id,
      CAST(get_json_object(json, '$.article_id') AS BIGINT) AS article_id,
      CAST(get_json_object(json, '$.occurred_at') AS BIGINT) AS occurred_at
    FROM freeexchanged.interaction_events_raw;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-server2
  namespace: freeexchanged
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-server2
  template:
    metadata:
      labels:
        app: hive-server2
    spec:
      containers:
      - name: hive-server2
        image: apache/hive:4.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: SERVICE_NAME
          value: hiveserver2
        - name: HIVE_CUSTOM_CONF_DIR
          value: /opt/hive/conf
        ports:
        - name: thrift
          containerPort: 10000
        - name: web
          containerPort: 10002
        readinessProbe:
          tcpSocket:
            port: thrift
          initialDelaySeconds: 40
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: thrift
          initialDelaySeconds: 90
          periodSeconds: 30
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
        volumeMounts:
        - name: hive-config
          mountPath: /opt/hive/conf
        - name: hive-warehouse
          mountPath: /opt/hive/warehouse
        - name: hive-metastore
          mountPath: /opt/hive/metastore
      volumes:
      - name: hive-config
        configMap:
          name: hive-config
      - name: hive-warehouse
        persistentVolumeClaim:
          claimName: hive-warehouse-pvc
      - name: hive-metastore
        persistentVolumeClaim:
          claimName: hive-metastore-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hive-server2
  namespace: freeexchanged
spec:
  selector:
    app: hive-server2
  ports:
  - name: thrift
    port: 10000
    targetPort: 10000
  - name: web
    port: 10002
    targetPort: 10002
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hive-schema-init
  namespace: freeexchanged
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: hive-schema-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: hive-schema
        image: apache/hive:4.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: HIVE_CUSTOM_CONF_DIR
          value: /opt/hive/conf
        command:
        - sh
        - -ec
        - |
          until beeline -u jdbc:hive2://hive-server2:10000 -e "SHOW DATABASES" >/dev/null 2>&1; do
            sleep 5
          done
          beeline -u jdbc:hive2://hive-server2:10000 -f /schema/events.hql
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: hive-config
          mountPath: /opt/hive/conf
        - name: hive-schema
          mountPath: /schema
      volumes:
      - name: hive-config
        configMap:
          name: hive-config
      - name: hive-schema
        configMap:
          name: hive-schema-sql
