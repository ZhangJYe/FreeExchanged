apiVersion: v1
kind: ConfigMap
metadata:
  name: ranking-rpc-config
  namespace: freeexchanged
data:
  ranking.yaml: |
    Name: ranking.rpc
    ListenOn: 0.0.0.0:8082

    Prometheus:
      Host: 0.0.0.0
      Port: 9094
      Path: /metrics

    Telemetry:
      Name: ranking-rpc
      Endpoint: jaeger-svc:4318
      Sampler: 1.0
      Batcher: otlphttp
      OtlpHttpPath: /v1/traces

    BizRedis:
      Host: redis-svc:6379
      Type: node

    RabbitMQ:
      Host: rabbitmq-svc
      Port: 5672
      Username: guest
      Password: guest
      VHost: /
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranking-rpc
  namespace: freeexchanged
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ranking-rpc
  template:
    metadata:
      labels:
        app: ranking-rpc
    spec:
      containers:
      - name: ranking-rpc
        image: freeexchanged/ranking-rpc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: grpc
          containerPort: 8082
        - name: metrics
          containerPort: 9094
        volumeMounts:
        - name: config
          mountPath: /app/etc
      volumes:
      - name: config
        configMap:
          name: ranking-rpc-config
---
apiVersion: v1
kind: Service
metadata:
  name: ranking-rpc-svc
  namespace: freeexchanged
spec:
  selector:
    app: ranking-rpc
  ports:
  - name: grpc
    port: 8082
    targetPort: 8082
  - name: metrics
    port: 9094
    targetPort: 9094
