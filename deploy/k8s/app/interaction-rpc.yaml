apiVersion: v1
kind: ConfigMap
metadata:
  name: interaction-rpc-config
  namespace: freeexchanged
data:
  interaction.yaml: |
    Name: interaction.rpc
    ListenOn: 0.0.0.0:8081

    Prometheus:
      Host: 0.0.0.0
      Port: 9093
      Path: /metrics

    Telemetry:
      Name: interaction-rpc
      Endpoint: jaeger-svc:4318
      Sampler: 1.0
      Batcher: otlphttp
      OtlpHttpPath: /v1/traces

    DataSource: ${MYSQL_DSN}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interaction-rpc
  namespace: freeexchanged
spec:
  revisionHistoryLimit: 3
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: interaction-rpc
  template:
    metadata:
      labels:
        app: interaction-rpc
    spec:
      containers:
      - name: interaction-rpc
        image: freeexchanged/interaction-rpc:v0.1.0
        imagePullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: freeexchanged-secrets
        ports:
        - name: grpc
          containerPort: 8081
        - name: metrics
          containerPort: 9093
        readinessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 8
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /app/etc
      volumes:
      - name: config
        configMap:
          name: interaction-rpc-config
---
apiVersion: v1
kind: Service
metadata:
  name: interaction-rpc-svc
  namespace: freeexchanged
spec:
  selector:
    app: interaction-rpc
  ports:
  - name: grpc
    port: 8081
    targetPort: 8081
  - name: metrics
    port: 9093
    targetPort: 9093
