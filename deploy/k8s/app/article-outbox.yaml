apiVersion: v1
kind: ConfigMap
metadata:
  name: article-outbox-config
  namespace: freeexchanged
data:
  outbox.yaml: |
    DataSource: ${MYSQL_DSN}
    PollIntervalSeconds: 2
    BatchSize: 50
    ClaimTimeoutSeconds: 30

    Kafka:
      Brokers:
        - kafka-svc:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: article-outbox
  namespace: freeexchanged
spec:
  revisionHistoryLimit: 3
  replicas: 2
  selector:
    matchLabels:
      app: article-outbox
  template:
    metadata:
      labels:
        app: article-outbox
    spec:
      containers:
      - name: article-outbox
        image: freeexchanged/article-outbox:v0.1.0
        imagePullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: freeexchanged-secrets
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /app/etc
      volumes:
      - name: config
        configMap:
          name: article-outbox-config
