apiVersion: v1
kind: ConfigMap
metadata:
  name: interaction-outbox-config
  namespace: freeexchanged
data:
  outbox.yaml: |
    DataSource: ${MYSQL_DSN}
    PollIntervalSeconds: 2
    BatchSize: 100
    ClaimTimeoutSeconds: 30

    Kafka:
      Brokers:
        - kafka-svc:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interaction-outbox
  namespace: freeexchanged
spec:
  revisionHistoryLimit: 3
  replicas: 2
  selector:
    matchLabels:
      app: interaction-outbox
  template:
    metadata:
      labels:
        app: interaction-outbox
    spec:
      containers:
      - name: interaction-outbox
        image: freeexchanged/interaction-outbox:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: freeexchanged-secrets
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /app/etc
      volumes:
      - name: config
        configMap:
          name: interaction-outbox-config
