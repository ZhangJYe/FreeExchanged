apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: freeexchanged
data:
  gateway.yaml: |
    Name: gateway
    Host: 0.0.0.0
    Port: 8888

    CpuThreshold: 900
    MaxConns: 10000

    Prometheus:
      Host: 0.0.0.0
      Port: 9091
      Path: /metrics

    Telemetry:
      Name: gateway
      Endpoint: jaeger-svc:4318
      Sampler: 1.0
      Batcher: otlphttp
      OtlpHttpPath: /v1/traces

    Identity:
      AccessSecret: "yNgBwFodlqorfsT21cTjdafFVhU3lXUKBq9OBNW8IHU="
      AccessExpire: 86400

    UserRpc:
      Endpoints:
        - user-rpc-svc:8080
      NonBlock: true

    InteractionRpc:
      Endpoints:
        - interaction-rpc-svc:8081
      NonBlock: true

    RankingRpc:
      Endpoints:
        - ranking-rpc-svc:8082
      NonBlock: true

    RateRpc:
      Endpoints:
        - rate-rpc-svc:8083
      NonBlock: true

    ArticleRpc:
      Endpoints:
        - article-rpc-svc:8084
      NonBlock: true

    WatchlistRpc:
      Endpoints:
        - watchlist-rpc-svc:8085
      NonBlock: true

    Redis:
      Host: redis-svc:6379
      Type: node

    Log:
      Mode: console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: freeexchanged
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: freeexchanged/gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8888
        - name: metrics
          containerPort: 9091
        volumeMounts:
        - name: config
          mountPath: /app/etc
        readinessProbe:
          httpGet:
            path: /v1/ranking/top
            port: 8888
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-svc
  namespace: freeexchanged
spec:
  selector:
    app: gateway
  ports:
  - name: http
    port: 8888
    targetPort: 8888
  - name: metrics
    port: 9091
    targetPort: 9091
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: freeexchanged
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /v1
        pathType: Prefix
        backend:
          service:
            name: gateway-svc
            port:
              number: 8888
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: gateway-svc
            port:
              number: 8888
