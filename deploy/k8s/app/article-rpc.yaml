apiVersion: v1
kind: ConfigMap
metadata:
  name: article-rpc-config
  namespace: freeexchanged
data:
  article.yaml: |
    Name: article.rpc
    ListenOn: 0.0.0.0:8084

    Prometheus:
      Host: 0.0.0.0
      Port: 9096
      Path: /metrics

    Telemetry:
      Name: article-rpc
      Endpoint: jaeger-svc:4318
      Sampler: 1.0
      Batcher: otlphttp
      OtlpHttpPath: /v1/traces

    DataSource: ${MYSQL_DSN}

    Kafka:
      Brokers:
        - kafka-svc:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: article-rpc
  namespace: freeexchanged
spec:
  revisionHistoryLimit: 3
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: article-rpc
  template:
    metadata:
      labels:
        app: article-rpc
    spec:
      containers:
      - name: article-rpc
        image: freeexchanged/article-rpc:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: freeexchanged-secrets
        ports:
        - name: grpc
          containerPort: 8084
        - name: metrics
          containerPort: 9096
        readinessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 8
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /app/etc
      volumes:
      - name: config
        configMap:
          name: article-rpc-config
---
apiVersion: v1
kind: Service
metadata:
  name: article-rpc-svc
  namespace: freeexchanged
spec:
  selector:
    app: article-rpc
  ports:
  - name: grpc
    port: 8084
    targetPort: 8084
  - name: metrics
    port: 9096
    targetPort: 9096
