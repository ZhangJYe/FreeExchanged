apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - k8s/namespace.yaml
  - k8s/infra/mysql.yaml
  - k8s/infra/redis.yaml
  - k8s/infra/kafka.yaml
  - k8s/infra/kafka-topics-job.yaml
  - k8s/infra/jaeger.yaml
  - k8s/infra/prometheus.yaml
  - k8s/infra/grafana.yaml
  - k8s/app/db-migration-job.yaml
  - k8s/app/user-rpc.yaml
  - k8s/app/interaction-rpc.yaml
  - k8s/app/article-rpc.yaml
  - k8s/app/rate-rpc.yaml
  - k8s/app/watchlist-rpc.yaml
  - k8s/app/article-outbox.yaml
  - k8s/app/interaction-outbox.yaml
  - k8s/app/ranking-stream.yaml
  - k8s/app/ranking-rpc.yaml
  - k8s/app/rate-job.yaml
  - k8s/app/gateway.yaml
  - k8s/app/web.yaml
  - k3s/lite/gateway-edge-svc.yaml
  - k3s/lite/web-edge-svc.yaml

patches:
  - path: k3s/lite/delete-gateway-ingress.yaml
  - target:
      kind: Deployment
      name: gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: user-rpc
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: interaction-rpc
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: article-rpc
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: rate-rpc
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: watchlist-rpc
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: ranking-rpc
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: article-outbox
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: interaction-outbox
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: ranking-stream
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: StatefulSet
      name: kafka
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: StatefulSet
      name: kafka
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: 1@kafka-0.kafka-headless.freeexchanged.svc.cluster.local:9093
      - op: replace
        path: /spec/template/spec/containers/0/env/10/value
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/env/11/value
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/env/13/value
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/env/14/value
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/env/15/value
        value: "1"
  - target:
      kind: Job
      name: kafka-topic-init
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command/2
        value: |
          until kafka-topics.sh --bootstrap-server kafka-svc:9092 --list >/dev/null 2>&1; do
            sleep 2
          done
          expected_partitions=3
          expected_rf=1
          expected_min_isr=1
          for topic in article.events interaction.events ranking.dlq; do
            kafka-topics.sh \
              --bootstrap-server kafka-svc:9092 \
              --create \
              --if-not-exists \
              --topic "$topic" \
              --partitions "$expected_partitions" \
              --replication-factor "$expected_rf" \
              --config min.insync.replicas="$expected_min_isr"

            kafka-configs.sh \
              --bootstrap-server kafka-svc:9092 \
              --alter \
              --entity-type topics \
              --entity-name "$topic" \
              --add-config min.insync.replicas="$expected_min_isr"

            desc="$(kafka-topics.sh --bootstrap-server kafka-svc:9092 --describe --topic "$topic")"
            echo "$desc"
            partitions="$(printf '%s\n' "$desc" | awk -F'PartitionCount: ' '/PartitionCount:/ { split($2, a, " "); print a[1]; exit }')"
            if [ -z "$partitions" ]; then
              echo "unable to read partition count for topic $topic" >&2
              exit 1
            fi
            if [ "$partitions" -lt "$expected_partitions" ]; then
              kafka-topics.sh --bootstrap-server kafka-svc:9092 --alter --topic "$topic" --partitions "$expected_partitions"
              desc="$(kafka-topics.sh --bootstrap-server kafka-svc:9092 --describe --topic "$topic")"
              echo "$desc"
              partitions="$(printf '%s\n' "$desc" | awk -F'PartitionCount: ' '/PartitionCount:/ { split($2, a, " "); print a[1]; exit }')"
              if [ -z "$partitions" ]; then
                echo "unable to read partition count for topic $topic after alter" >&2
                exit 1
              fi
            fi

            rf="$(printf '%s\n' "$desc" | awk -F'ReplicationFactor: ' '/ReplicationFactor:/ { split($2, a, " "); print a[1]; exit }')"
            if [ -z "$rf" ]; then
              echo "unable to read replication factor for topic $topic" >&2
              exit 1
            fi
            if [ "$rf" != "$expected_rf" ]; then
              echo "topic $topic replication factor is $rf, expected $expected_rf for the K3s lite overlay" >&2
              exit 1
            fi
            if [ "$partitions" -lt "$expected_partitions" ]; then
              echo "topic $topic partition count is $partitions, expected at least $expected_partitions" >&2
              exit 1
            fi
            if ! kafka-configs.sh --bootstrap-server kafka-svc:9092 --describe --entity-type topics --entity-name "$topic" | grep -q "min.insync.replicas=$expected_min_isr"; then
              echo "topic $topic min.insync.replicas is not $expected_min_isr" >&2
              exit 1
            fi
          done
  - target:
      kind: PodDisruptionBudget
      name: kafka-pdb
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 1
  - target:
      kind: StatefulSet
      name: kafka
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: KAFKA_HEAP_OPTS
          value: -Xms256m -Xmx256m
  - target:
      kind: StatefulSet
      name: kafka
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 384Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 768Mi
  - target:
      kind: StatefulSet
      name: mysql
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 384Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 768Mi
  - target:
      kind: Deployment
      name: jaeger
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 384Mi

images:
  - name: freeexchanged/gateway
    newTag: k3s
  - name: freeexchanged/user-rpc
    newTag: k3s
  - name: freeexchanged/interaction-rpc
    newTag: k3s
  - name: freeexchanged/article-rpc
    newTag: k3s
  - name: freeexchanged/rate-rpc
    newTag: k3s
  - name: freeexchanged/watchlist-rpc
    newTag: k3s
  - name: freeexchanged/ranking-rpc
    newTag: k3s
  - name: freeexchanged/article-outbox
    newTag: k3s
  - name: freeexchanged/interaction-outbox
    newTag: k3s
  - name: freeexchanged/ranking-stream
    newTag: k3s
  - name: freeexchanged/rate-job
    newTag: k3s
  - name: freeexchanged/web
    newTag: k3s
