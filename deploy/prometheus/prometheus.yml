global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['host.docker.internal:9091']

  - job_name: 'user-rpc'
    static_configs:
      - targets: ['host.docker.internal:9092']

  - job_name: 'interaction-rpc'
    static_configs:
      - targets: ['host.docker.internal:9093']

  - job_name: 'ranking-rpc'
    static_configs:
      - targets: ['host.docker.internal:9094']
