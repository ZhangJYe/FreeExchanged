name: CI Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_REPOSITORY_PREFIX: freeexchanged

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web

  images:
    runs-on: ubuntu-latest
    needs: test
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::12}" >> "$GITHUB_ENV"
      - name: Render Kubernetes manifests
        run: |
          mkdir -p dist
          cp -R deploy/k8s dist/k8s
          find dist/k8s/app -type f -name '*.yaml' -exec sed -i "s/:v0.1.0/:${IMAGE_TAG}/g" {} +
          tar -C dist -czf "k8s-manifests-${IMAGE_TAG}.tar.gz" k8s
      - uses: actions/upload-artifact@v4
        with:
          name: k8s-manifests-${{ env.IMAGE_TAG }}
          path: k8s-manifests-${{ env.IMAGE_TAG }}.tar.gz
      - uses: docker/setup-buildx-action@v3
      - name: Build and push images
        shell: bash
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "Docker Hub secrets are not configured; skipping image push."
            exit 0
          fi

          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          while IFS='|' read -r image cmd_path; do
            docker buildx build \
              --platform linux/amd64 \
              -f deploy/docker/go-service.Dockerfile \
              --build-arg CMD_PATH="$cmd_path" \
              -t "$IMAGE_REPOSITORY_PREFIX/$image:$IMAGE_TAG" \
              --push \
              .
          done <<'SERVICES'
          gateway|./app/gateway
          user-rpc|./app/user/cmd/rpc
          interaction-rpc|./app/interaction/cmd/rpc
          article-rpc|./app/article/cmd/rpc
          article-outbox|./app/article/cmd/outbox
          interaction-outbox|./app/interaction/cmd/outbox
          ranking-stream|./app/ranking/cmd/stream
          ranking-rpc|./app/ranking/cmd/rpc
          rate-rpc|./app/rate/cmd/rpc
          watchlist-rpc|./app/watchlist/cmd/rpc
          rate-job|./app/rate/cmd/job
          SERVICES

          docker buildx build \
            --platform linux/amd64 \
            --build-arg VITE_APP_BASE=/ \
            -t "$IMAGE_REPOSITORY_PREFIX/web:$IMAGE_TAG" \
            --push \
            ./web
