Name: rate.rpc
ListenOn: 0.0.0.0:8083

Prometheus:
  Host: 0.0.0.0
  Port: 9095
  Path: /metrics

Telemetry:
  Name: rate-rpc
  Endpoint: localhost:4318
  Sampler: 1.0
  Batcher: otlphttp
  OtlpHttpPath: /v1/traces

# Consul 服务注册
Consul:
  Host: 127.0.0.1:8500
  Key: rate.rpc

# Redis 配置（读取汇率缓存）
BizRedis:
  Host: 127.0.0.1:6380
  Type: node
