syntax = "proto3";

package user;
option go_package = "./pb";

// 1. 登录
message LoginReq {
  string mobile = 1;
  string password = 2;
}

message LoginResp {
  int64 id = 1;
  string nickname = 2;
  string token = 3;
  int64 expireAt = 4;
}

// 2. 注册
message RegisterReq {
  string mobile = 1;
  string password = 2;
  string nickname = 3;
}
message RegisterResp {
  int64 id = 1;
  string token = 2;
  int64 expireAt = 3;
}

message PingReq {}
message PingResp {}

// 4. 用户信息
message UserInfoReq {
  int64 id = 1;
}
message UserInfoResp {
  int64 id = 1;
  string mobile = 2;
  string nickname = 3;
}

// 5. 注销/登出
message LogoutReq {
  string token = 1; // 只需要传原来的 Token
}
message LogoutResp {}

service User {
  rpc Login(LoginReq) returns(LoginResp);
  rpc Register(RegisterReq) returns(RegisterResp);
  rpc Ping(PingReq) returns(PingResp);
  rpc UserInfo(UserInfoReq) returns(UserInfoResp);
  rpc Logout(LogoutReq) returns(LogoutResp);
}