syntax = "proto3";

package ranking;
option go_package = "./pb";

message RankItem {
  int64 article_id = 1;
  int64 score = 2;
  string title = 3; // 额外返回标题，方便前端展示
}

message GetTopReq {
  int32 n = 1; // Top N，如 10
}
message GetTopResp {
  repeated RankItem items = 1;
}

service Ranking {
  rpc GetTop(GetTopReq) returns(GetTopResp);
}
